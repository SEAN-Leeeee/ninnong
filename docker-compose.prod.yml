version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always

  app:
    image: ${APP_IMAGE}
    container_name: spring-ninnong
    ports:
      - "8080:8080"

    # 🔴 핵심: env_file 명시
    env_file:
      - .env.prod

    environment:
      # Spring profile
      SPRING_PROFILES_ACTIVE: prod

      # JPA
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

      # Logging
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_TRANSACTION: DEBUG
      LOGGING_LEVEL_ORG_HIBERNATE_SQL: DEBU

      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

      # File upload
      SPRING_APPLICATION_JSON: >
        {"file":{"upload-dir":"/app/uploads"}}

    volumes:
      - ./uploads:/app/uploads

    depends_on:
      - redis

    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vue-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    restart: always
